name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write   # needed to push to gh-pages branch

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests (Karma headless)
        run: pnpm run test:ci

      - name: Build production bundle
        run: pnpm run build -- --base-href /github-trending/
        # --base-href sets the base URL for GitHub Pages deployment
        # Replace "github-trending" with your actual repo name if different

      # Only deploy on pushes to main (not on PRs)
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/github-trending/browser
          branch: gh-pages
